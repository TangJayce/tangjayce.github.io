<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>星空</title>
    <style>
        body{
            background: radial-gradient(300% 100% at top, #14253e 10%, #75517d 40%, #e98296 65%, #f7eca7) fixed;
            overflow: hidden;
        }
        @keyframes rotate{
            from{
                transform: perspective(400px) rotateZ(20deg) rotateX(-40deg) rotateY(0);
            }
            to{
                transform: perspective(400px) rotateZ(20deg) rotateX(-40deg) rotateY(-360deg);
            }
        }
        .stars{
            transform: perspective(500px);
            transform-style: preserve-3d;
            position: absolute;
            perspective-origin: 50% 100%;
            left: 50%;
            animation: rotate 90s infinite linear;
            bottom: 0;
        }
        .star{
            width: 2px;
            height: 2px;
            background: #eef5ca;
            position: absolute;
        }
    </style>
</head>
<body>
<div class="stars"/>

<script type="text/javascript">
    const starsCount = 800;
    const distance = 800;
    window.onload = function(){
        const parentDiv = document.getElementsByClassName("stars")[0];
        for (let i = 0; i < starsCount; i++){
            let childDiv = document.createElement("div");
            childDiv.className="star";
            let speed = 0.3 + Math.random();
            let thisDistance = (distance + (Math.random() * 300));
            let rotate_x = Math.random() * -50;
            let rotate_y = Math.random() * 360;
            childDiv.style.transformOrigin = `0 0 ${thisDistance}px`;
            childDiv.style.transform = `translate3d(0,0,-${thisDistance}px) rotateY(${rotate_y}deg) rotateX(${rotate_x}deg) scale(${speed},${speed})`;
            parentDiv.append(childDiv);
        }
    };
</script>
</body>
</html>
